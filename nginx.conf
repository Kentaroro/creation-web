server {
    listen 80;
    server_name your-domain.com;
    root /var/www/html/creation-web;
    index index.html;

    location / {
        try_files $uri $uri/ /creation-web/index.html;
    }

    location /creation-web/ {
        alias /var/www/html/creation-web/;
        try_files $uri $uri/ /creation-web/index.html;
    }
}
